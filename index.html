<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brawlball</title>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>

      <!-- HUD -->
      <div id="hud">
        <div id="topbar">
          <div id="scoreboard">
            <span class="chip" id="playersChip">Players: 1</span>
            <span class="chip hidden" id="winnerChip">🏆</span>
          </div>
          <div class="chip" id="banner">🏁 RACE — first to the finish line!</div>
        </div>

        <div id="flash" class="hidden">🏁 You crossed the line — football time!</div>

        <div id="controls">
          <b>E</b> get in / out of a car · <b>WASD</b> drive &amp; move · <b>Space</b> kick the ball
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
